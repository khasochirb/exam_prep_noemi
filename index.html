<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography History - Study Guide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --card-hover: #222;
            --accent: #e8a87c;
            --accent2: #d4a574;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #333;
            --success: #4caf50;
            --danger: #e57373;
            --theory-accent: #f0a830;
            --theory-accent2: #d4942a;
            --theory-glow: rgba(240,168,48,0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        nav h1 {
            font-size: 1.1rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
        }
        .nav-tabs button {
            padding: 8px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-tabs button.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }
        .nav-tabs button.active.theory-tab-active {
            background: var(--theory-accent);
            border-color: var(--theory-accent);
        }
        .nav-tabs button:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text);
        }
        .search-box {
            margin-left: auto;
            position: relative;
        }
        .search-box input {
            padding: 8px 16px 8px 36px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 6px;
            font-size: 0.9rem;
            width: 260px;
            outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box::before {
            content: "\1F50D";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
        }

        /* FILTERS */
        .filters {
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .filter-btn {
            padding: 5px 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .filter-btn:hover:not(.active) {
            border-color: var(--accent2);
            color: var(--text);
        }
        .filter-btn.theory-filter.active {
            background: var(--theory-accent);
            border-color: var(--theory-accent);
        }

        /* GALLERY */
        #gallery {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #222;
            display: block;
        }
        .card-img-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
        .card-body {
            padding: 16px;
        }
        .card-num {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .card-author {
            font-size: 0.9rem;
            color: var(--accent2);
            margin-bottom: 6px;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .card-lecture {
            display: inline-block;
            margin-top: 8px;
            padding: 2px 10px;
            background: rgba(232,168,124,0.15);
            color: var(--accent);
            border-radius: 12px;
            font-size: 0.75rem;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
        }
        .modal-img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: #111;
        }
        .modal-img-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-style: italic;
        }
        .modal-body {
            padding: 24px;
        }
        .modal-body h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--accent);
        }
        .modal-body .author {
            font-size: 1.1rem;
            color: var(--accent2);
            margin-bottom: 16px;
        }
        .modal-detail {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .modal-detail strong {
            color: var(--accent);
        }
        .modal-nav {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }
        .modal-nav button {
            padding: 8px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-nav button:hover {
            border-color: var(--accent);
            background: rgba(232,168,124,0.1);
        }

        /* FLASHCARD MODE */
        #flashcard-view {
            display: none;
            padding: 24px;
            max-width: 700px;
            margin: 0 auto;
        }
        .fc-progress {
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .fc-progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .fc-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }
        .flashcard {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            perspective: 1000px;
            position: relative;
        }
        .flashcard:hover {
            border-color: var(--accent);
        }
        .fc-img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .fc-img-placeholder {
            width: 280px;
            height: 200px;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-style: italic;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            padding: 16px;
        }
        .fc-question {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 12px;
        }
        .fc-hint {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .fc-answer {
            display: none;
            text-align: left;
            width: 100%;
        }
        .fc-answer h3 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .fc-answer p {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .fc-answer .label {
            color: var(--accent2);
            font-weight: 600;
        }
        .fc-tap {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .fc-controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .fc-btn {
            padding: 10px 28px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .fc-btn:hover {
            border-color: var(--accent);
        }
        .fc-btn.knew {
            border-color: var(--success);
            color: var(--success);
        }
        .fc-btn.knew:hover {
            background: rgba(76,175,80,0.15);
        }
        .fc-btn.didnt {
            border-color: var(--danger);
            color: var(--danger);
        }
        .fc-btn.didnt:hover {
            background: rgba(229,115,115,0.15);
        }

        /* FLASHCARD SETTINGS */
        .fc-settings {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .fc-settings h3 {
            color: var(--accent);
            margin-bottom: 16px;
        }
        .fc-setting-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .fc-setting-row label {
            font-size: 0.9rem;
            color: var(--text-dim);
            min-width: 120px;
        }
        .fc-setting-row select, .fc-setting-row input[type="number"] {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .fc-start-btn {
            margin-top: 8px;
            padding: 10px 32px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .fc-start-btn:hover { opacity: 0.9; }

        /* SCORE */
        .fc-score {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .fc-score h2 {
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        .fc-score .big-num {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text);
        }
        .fc-score p {
            color: var(--text-dim);
            margin: 8px 0;
        }

        /* CHECKLIST MODE */
        #checklist-view {
            display: none;
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        .checklist-lecture {
            margin-bottom: 24px;
        }
        .checklist-lecture h3 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 1rem;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(51,51,51,0.4);
        }
        .checklist-item input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checklist-item.checked .cl-text {
            text-decoration: line-through;
            color: var(--text-dim);
        }
        .cl-text {
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .cl-text strong { color: var(--accent2); }
        .checklist-stats {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .checklist-stats span {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .checklist-stats strong {
            color: var(--accent);
        }

        /* THEORY VIEW */
        #theory-view {
            display: none;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .theory-sub-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .theory-sub-tabs button {
            padding: 10px 24px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .theory-sub-tabs button.active {
            background: var(--theory-accent);
            color: #000;
            border-color: var(--theory-accent);
            font-weight: 600;
        }
        .theory-sub-tabs button:hover:not(.active) {
            border-color: var(--theory-accent);
            color: var(--text);
        }
        .theory-search {
            margin-bottom: 16px;
            position: relative;
        }
        .theory-search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }
        .theory-search input:focus { border-color: var(--theory-accent); }
        .theory-search::before {
            content: "\1F50D";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }
        #theory-filters {
            padding: 0 0 16px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* CONCEPT CARDS GRID */
        #concept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .concept-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }
        .concept-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--theory-accent), var(--theory-accent2));
        }
        .concept-card:hover {
            transform: translateY(-2px);
            border-color: var(--theory-accent);
        }
        .concept-card .thinker {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--theory-accent);
            margin-bottom: 4px;
        }
        .concept-card .thinker-years {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .concept-card .concept-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .concept-card .category-tag {
            display: inline-block;
            padding: 2px 10px;
            background: var(--theory-glow);
            color: var(--theory-accent);
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
        .concept-card .teaser {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* THEORY MODAL */
        .theory-modal-body h2 {
            color: var(--theory-accent) !important;
        }
        .theory-modal-body .modal-detail strong {
            color: var(--theory-accent);
        }
        .theory-modal-body .key-term {
            background: var(--theory-glow);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--theory-accent);
            font-weight: 600;
        }

        /* THEORY FLASHCARD SETTINGS */
        .theory-fc-settings h3 {
            color: var(--theory-accent);
        }
        .theory-fc-settings .fc-start-btn {
            background: var(--theory-accent);
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            nav { padding: 10px 12px; }
            nav h1 { font-size: 0.95rem; width: 100%; }
            .search-box { margin-left: 0; width: 100%; }
            .search-box input { width: 100%; }
            #gallery { padding: 12px; grid-template-columns: 1fr; }
            .modal-body { padding: 16px; }
            #flashcard-view, #checklist-view, #theory-view { padding: 12px; }
            #concept-grid { grid-template-columns: 1fr; }
        }

        /* Keyboard shortcut hints */
        .shortcut-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
            z-index: 50;
        }
        .shortcut-hint kbd {
            background: var(--border);
            padding: 1px 6px;
            border-radius: 3px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <nav>
        <h1>Photography History</h1>
        <div class="nav-tabs">
            <button class="active" onclick="switchView('gallery')">Gallery</button>
            <button onclick="switchView('flashcard')">Flashcards</button>
            <button onclick="switchView('checklist')">Checklist</button>
            <button onclick="switchView('theory')">Theory</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by author, title, year..." oninput="filterGallery()">
        </div>
    </nav>
    <div class="filters" id="filters"></div>

    <div id="gallery"></div>

    <div id="flashcard-view">
        <div class="fc-settings" id="fc-settings">
            <h3>Flashcard Settings</h3>
            <div class="fc-setting-row">
                <label>Lesson:</label>
                <select id="fc-lecture">
                    <option value="all">All Lessons</option>
                </select>
            </div>
            <div class="fc-setting-row">
                <label>Quiz type:</label>
                <select id="fc-type">
                    <option value="image-to-info">Image &rarr; Guess Info</option>
                    <option value="title-to-author">Title &rarr; Guess Author</option>
                    <option value="author-to-works">Author &rarr; Guess Works</option>
                    <option value="random">Random Mix</option>
                </select>
            </div>
            <div class="fc-setting-row">
                <label>Cards:</label>
                <input type="number" id="fc-count" value="20" min="1" max="103">
            </div>
            <div class="fc-setting-row">
                <label></label>
                <label style="min-width:auto"><input type="checkbox" id="fc-shuffle" checked style="accent-color:var(--accent)"> Shuffle order</label>
            </div>
            <div class="fc-setting-row">
                <label></label>
                <button class="fc-start-btn" onclick="startFlashcards()">Start Studying</button>
            </div>
        </div>
        <div id="fc-session" style="display:none">
            <div class="fc-progress">
                <span id="fc-progress-text"></span>
                <div class="fc-progress-bar"><div class="fc-progress-fill" id="fc-progress-fill"></div></div>
            </div>
            <div class="flashcard" id="flashcard" onclick="flipCard()"></div>
            <div class="fc-controls" id="fc-controls">
                <button class="fc-btn didnt" onclick="markCard(false)">Didn't Know</button>
                <button class="fc-btn" onclick="flipCard()">Flip Card</button>
                <button class="fc-btn knew" onclick="markCard(true)">Knew It</button>
            </div>
        </div>
        <div class="fc-score" id="fc-score"></div>
    </div>

    <div id="checklist-view"></div>

    <!-- THEORY VIEW -->
    <div id="theory-view">
        <div class="theory-sub-tabs">
            <button class="active" onclick="switchTheoryTab('concepts')">Concept Cards</button>
            <button onclick="switchTheoryTab('theory-fc')">Theory Flashcards</button>
        </div>

        <div id="theory-concepts-panel">
            <div class="theory-search">
                <input type="text" id="theorySearchInput" placeholder="Search thinkers, concepts, categories..." oninput="filterConcepts()">
            </div>
            <div id="theory-filters"></div>
            <div id="concept-grid"></div>
        </div>

        <div id="theory-fc-panel" style="display:none">
            <div class="fc-settings theory-fc-settings" id="tfc-settings">
                <h3>Theory Flashcard Settings</h3>
                <div class="fc-setting-row">
                    <label>Category:</label>
                    <select id="tfc-category">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="fc-setting-row">
                    <label>Cards:</label>
                    <input type="number" id="tfc-count" value="10" min="1" max="99">
                </div>
                <div class="fc-setting-row">
                    <label></label>
