const concepts = [
  {id:1, thinker:"Erwin Panofsky", years:"1892\u20131968", concept:"Iconography & Iconology", category:"Iconology",
   teaser:"Three levels of reading an image: what you see, what it means, and why it matters.",
   full:"Panofsky, considered the father of visual culture studies, distinguished three levels of image reading in his study 'The Meaning of the Visual Arts' (1955):<br><br><b>1. Pre-iconographic description</b>: Recognizing the primary, natural subject matter \u2014 what we literally see (forms, colors, figures).<br><br><b>2. Iconographic analysis</b>: Identifying the secondary, conventional meaning \u2014 connecting images to literary sources, cultural themes, and traditions. For example, thirteen people seated at a table in certain poses represent the Last Supper.<br><br><b>3. Iconological synthesis</b>: Grasping the intrinsic content \u2014 the deeper cultural, philosophical, and psychological significance tied to the artist's intentions, their era, and worldview. Symbols become 'cultural symptoms.'<br><br>Panofsky argues that any object can be experienced aesthetically, not just for its function. What distinguishes a work of art is the <b>intentio</b> of its creator \u2014 the aesthetic intention cannot be absolutely determined. The interest in form, which transmits ideas and emotions, is what defines art.<br><br>Key insight: When scrolling through images on social media, we usually remain at the pre-iconographic level. Only when we pause and engage deeply can we descend to iconographic and iconological analysis."},
  {id:2, thinker:"Charles Sanders Peirce", years:"1839\u20131914", concept:"Triadic Semiosis", category:"Semiotics",
   teaser:"Signs work through a three-part relationship: object, sign, and interpretant.",
   full:"Peirce, one of the fathers of Pragmatism, developed a triadic theory of signs (semiosis) based on the relationship between:<br><br><b>Object (Referent)</b>: The thing being referred to.<br><b>Sign</b>: The representation of that thing.<br><b>Interpretant</b>: The idea generated in the mind of the observer.<br><br>The process of semiosis gives primacy to the object over the subject. It is the sign that generates an idea (the interpretant) in the subject. This cognitive reflection has a social character, deriving from exchange between subjects.<br><br>Peirce's <b>theory of signs</b> distinguishes three types:<br>\u2022 <b>Icon</b>: Resembles the object (e.g., a portrait looks like the person).<br>\u2022 <b>Index</b>: Has a physical/causal connection to the object (e.g., a photograph is always an index because light from the object physically touched the film).<br>\u2022 <b>Symbol</b>: Connected to the object by convention (e.g., a flag representing a nation).<br><br>These categories are not exclusive \u2014 a photograph can be all three simultaneously. Photography is a perfect example of the <b>inextricable mix of index and icon</b>: it is an index because it proves the object existed (light radiations from the object), and simultaneously an icon because of its striking resemblance to reality. This is why it is called an 'iconic index' or 'indexical icon.'<br><br>Peirce saw photography as a field of open problems orbiting around the indexical sign without being resolved by it. <b>Indexicality</b> \u2014 the physical connection between sign and referent \u2014 is central to understanding photography's truth-claim."},
  {id:3, thinker:"Alfred Gell", years:"1945\u20131997", concept:"Art and Agency", category:"Agency",
   teaser:"Images possess a form of secondary agency \u2014 they act on us like social beings.",
   full:"The British anthropologist Alfred Gell introduced the concept of <b>agency</b> in relation to images in the late 1990s. Agency theory attributes a form of subjectivity to images, radically critiquing the idea that the relationship between observer and image distributes forces unilaterally.<br><br><b>Key concepts:</b><br>\u2022 <b>Secondary agency</b>: Images exercise forms of agency \u2014 they are available to act, to make themselves act (like dolls that are available to play the role of a subject). They possess a <b>potential charge to be activated</b>.<br>\u2022 <b>Living pictures</b>: Artifacts can be animated without being alive. They are 'animated but never living' \u2014 capable of forming relationships similar to interpersonal ones.<br>\u2022 <b>Distributed person (persona distribuita)</b>: The person and their properties extend beyond the bodily boundary. Particles of subjectivity and intentionality scatter onto objects the person creates, including images.<br><br>Gell connects this to <b>Epicurus</b>, who understood images as <b>simulacra</b> \u2014 phantoms that detach from objects and fly in all directions. <b>Lucretius</b> speaks of <b>exuviae</b> (empty shells of insects) that carry the imprint of the body.<br><br>The concept of the <b>occhiuto idol</b> (idol with many eyes) is key: ancient idols from 3000 BC have disproportionately large eyes that create a frontal relationship with the spectator. The idol makes the spectator feel watched, animating the fetish. Some Hindu idols have mirror fragments in their half-closed eyes, reflecting the believer's own gaze back at them \u2014 demonstrating <b>reflected agency</b>."},
  {id:4, thinker:"W.J.T. Mitchell", years:"1942\u2013", concept:"What Do Pictures Want?", category:"Visual Culture",
   teaser:"Images are not passive objects \u2014 they express desires, lack, and demand our attention.",
   full:"W.J. Thomas Mitchell, a pioneer of visual culture studies and author of 'Iconology' (1986) and 'Picture Theory' (1994), published <b>'What Do Pictures Want? The Life and Loves of Images'</b> (2005).<br><br>Mitchell argues that images express a sort of will \u2014 a <b>desiring intentionality</b> that manifests as a <b>desiring force</b>. Unlike Gell, who attributes animist agency, Mitchell sees images not as living objects but as inert ones that <b>act upon us</b>. To understand images better, we must consider them as objects with a partial form of life \u2014 <b>subaltern subjects</b> to be listened to.<br><br><b>Key ideas:</b><br>\u2022 Images send at least three incompatible messages: they <b>want to be seen</b>; they <b>don't want to be seen</b>; they are <b>indifferent to being seen</b>.<br>\u2022 The question is not what images are, but <b>what they want</b>.<br>\u2022 Images are <b>incomplete</b> \u2014 they possess only a partial form of life.<br><br><b>Picture vs. Image distinction</b>:<br>\u2022 <b>Image</b>: The immaterial content \u2014 what appears in the picture, which can survive independently as memory, reproduction, narrative.<br>\u2022 <b>Picture</b>: The material, tangible image \u2014 considered as medium/support. Mitchell compares the picture to the house/body in which the image takes up residence and incarnates its spirit.<br><br>Mitchell emphasizes the <b>materiality (apticità)</b> of images: they are made to be used, manipulated, touched. The bodily, intercorporeal relationship between images and observer is essential."},
  {id:5, thinker:"Roland Barthes", years:"1915\u20131980", concept:"Camera Lucida & Punctum", category:"Photography Theory",
   teaser:"The punctum is what pricks, wounds, and animates us in a photograph.",
   full:"In his seminal essay <b>'La camera chiara: nota sulla fotografia'</b> (Camera Lucida, 1980), Roland Barthes provides not a history but an <b>epistemology of photography</b>.<br><br>Barthes denounces the invasiveness of photography as a medium that <b>objectifies the person</b>. He writes that private life 'is that zone of space, of time, in which I am not an image, not an object.' Being photographed produces a sensation of inauthenticity: 'Every time I let myself be photographed, I am immutably touched by a sensation of inauthenticity, sometimes of imposture.'<br><br>Photography represents the moment when one is 'neither a subject nor an object, but rather <b>a subject who feels becoming an object</b>.'<br><br>Barthes introduces the concept of <b>punctum</b>: something in a photograph that <b>pricks, wounds, and animates</b> the viewer in a subjective, personal way. It is an element that rises from the scene, as if shot like an arrow, and pierces the observer. The punctum contrasts with the <b>studium</b> \u2014 the cultural, linguistic, political interest we take in a photograph.<br><br>Barthes was influenced by <b>Susan Sontag</b>'s 'On Photography' (1977), which saw photography as a form of <b>'predatory violence'</b> \u2014 the photographer imposes a gaze, invading the other's sphere of safety. Sontag wrote: 'To photograph is to transform people into objects that can be symbolically possessed.'<br><br>The essence of photography, Barthes writes, is the fixation of a fragment of reality \u2014 a 'this has been' (<b>\u00e7a a \u00e9t\u00e9</b>)."},
  {id:6, thinker:"Horst Bredekamp", years:"1947\u2013", concept:"Images That Stare Back", category:"Agency",
   teaser:"Images possess a latent efficacy \u2014 once produced, they become autonomous and incite powerful responses.",
   full:"Horst Bredekamp, like Panofsky a German art historian, published in 2015 his essay <b>'Immagini che ci guardano'</b> (Images That Stare Back). The title references Alfred Gell's thought.<br><br>According to Bredekamp, images come to us 'under the sign of an alien corporeality.' They do not belong to our nature, and for this reason <b>language is not adequate to explain them</b>. Once produced, images <b>become autonomous</b> and inspire both admiration and fear \u2014 they are objects capable of arousing the strongest sensations.<br><br><b>Key concepts:</b><br>\u2022 <b>Emotional involvement (coinvolgimento emotivo)</b>: Images have power not just of signification but also of emotional engagement. Bredekamp argues that images are realized thanks to their <b>'human dimension'</b>.<br>\u2022 <b>Latent efficacy (efficacia latente)</b>: Images possess a potentiality that awaits activation by the spectator. The viewer does not passively receive but <b>activates</b> the image. The artifact confronts the spectator with a counterpart they cannot control.<br><br>Bredekamp develops the idea of <b>iconic autonomy</b>: the fascination of images means that once produced, they always possess something disturbing. The image is always different from the human's own vision of it \u2014 it is never merely the echo of its own seeing.<br><br>The image exercises a power that is only partly controllable by humans \u2014 at the perceptual, cognitive, and behavioral levels."},
  {id:7, thinker:"Gottfried Boehm", years:"1942\u2013", concept:"The Iconic Turn", category:"Iconic Turn",
   teaser:"In 2009, Boehm declared a shift from the dominance of language to the dominance of images.",
   full:"The German philosopher and art historian Gottfried Boehm published in 2009 <b>'La svolta iconica'</b> (The Iconic Turn), referencing Richard Rorty's 'Linguistic Turn' (1967) and the structuralist shift.<br><br>The iconic turn began in the late 1990s, especially in the US and Germany, where <b>visual culture studies</b> developed to investigate this paradigm shift. It represents a <b>crisis of the logos</b> \u2014 information is now primarily conveyed through images, not just text.<br><br><b>Key concepts:</b><br>\u2022 <b>Surplus</b>: The power and efficacy of images derive from a surplus that depends on their linguistic nature but surpasses the material in which they are inscribed. Images have the capacity to <b>impress us beyond our consciousness</b>.<br>\u2022 <b>Overcoming facticity (superamento della fatticit\u00e0)</b>: Images transcend the mere copying of reality. For Boehm, the image truly exists when it makes explicit its visual difference from the sensible world \u2014 the opposition between <b>factum and fictum</b>. The image behaves as a 'non-image' the more it tries to perfectly copy reality.<br>\u2022 <b>Differenza e comunica</b>: Power is simultaneously visual and logical, belonging inevitably to material culture; yet it allows a sense to appear that surpasses all facticity.<br><br>The iconic turn has involved not only art history and semiotics but also literature, linguistics, sociology, and psychology. Images act in a force field, together with other images in the same space-time. There is the image, the gaze, but also the atmosphere and the moment in which one looks at it."},
  {id:8, thinker:"Harun Farocki", years:"1944\u20132014", concept:"Operational Images", category:"Operational Images",
   teaser:"Images created not to represent but to act \u2014 machine vision that performs tasks in the world.",
   full:"The German filmmaker and video artist Harun Farocki first identified <b>operational images (immagini operative)</b> \u2014 a type of picture whose agency translates into concrete action in the world.<br><br>Operational images are distinguished from all other images because they are <b>not created for edifying, instructive, or representational purposes</b> but to cooperate in a precise technical process, performing a specific and concrete task.<br><br><b>Key moments:</b><br>\u2022 Operational images emerged during the <b>First Gulf War (1991)</b>: footage from the point of view of a 'smart missile' approaching its target. The weapons exercised a <b>'targeted gaze' (sguardo mirato)</b> \u2014 the image had 'attentive eyes' that guaranteed the exact execution of the task.<br>\u2022 What we were watching was <b>an action, not a representation</b>. The image has eyes and an intention.<br>\u2022 The image becomes the surrogate of the human, the agent in an increasingly automated chain of operations.<br><br>Farocki opens his documentary <b>'War at a Distance'</b> (2003) with these images. Two types: a black-and-white low-resolution one from the missile's camera, and a color computer-generated one for human viewers \u2014 the second is a 'courtesy gesture' from machine to human.<br><br>The <b>recognition</b> function is key: the machine does not truly 'see' but stores data and overlays patterns. When the live video matches the database schema, recognition occurs and the war action is triggered.<br><br><b>Algorithmic images</b> are the latest evolution: they exist as pure data without needing to manifest as visible, tangible objects. They speak to the world's matter, not to human senses."},
  {id:9, thinker:"Martin Heidegger", years:"1889\u20131976", concept:"Weltbild & the Iconosphere", category:"Visual Culture",
   teaser:"The world has been conquered as image \u2014 reality is dissolved into its visible appearance.",
   full:"The philosopher Martin Heidegger anticipated the visual turn in 1938 when he spoke of the <b>Weltbild</b> (world-picture), the epoch of the image of the world, identifying two consequences:<br><br><b>1. Multiplication of images</b>: In 1938, this was primarily through illustrated magazines. Today, humanity produces approximately one trillion images per year.<br><br><b>2. Substitution of direct experience</b>: A conquest of the <b>world resolved into image</b>. 'Resolved' (from German 'aufl\u00f6sen') means to untie, to disentangle elements that were interwoven. Complexity is undone; the world is reduced to its visible appearance. Not only do images multiply exponentially, but <b>the world itself becomes an image</b>.<br><br>This has evolved into what is now called the <b>iconosphere</b> \u2014 which has replaced the biosphere that characterized tens of thousands of years of human history. Some scholars see dangers: images are like traps, life is wrapped and trapped in images.<br><br>As <b>Bernard Stiegler</b> noted: 'Every experience that human beings have is in some way mediated by technical and technological instruments.' Today, <b>Epist\u00e9me and T\u00e9chne</b> are more than ever implicated \u2014 our knowledge and opinion of the world is mediated by images.<br><br>Today's generations grow up at the rhythm of the iconosphere (8 years) rather than the biosphere (25 years). The system of <b>living images (immagini viventi)</b> becomes the privileged social system on which our lives depend."},
  {id:10, thinker:"Bernard Stiegler", years:"1952\u20132020", concept:"Pharmakon", category:"Visual Culture",
   teaser:"The iconosphere is like a pharmakon \u2014 simultaneously a poison and a medicine.",
   full:"The French philosopher Bernard Stiegler proposed that the iconosphere functions as a <b>pharmakon</b> \u2014 a Greek term designating something that is <b>simultaneously a poison and a medicine</b>.<br><br>Through the use of reason, one can increase its curative function and reduce its toxicity. In this perspective, visual culture studies themselves are like a pharmakon \u2014 they are tools of analysis and political position-taking (i.e., publicly expressed opinion) in the face of the images we confront.<br><br>The pervasive presence of images conditions us unconsciously. We grow accustomed to 'visual noise' \u2014 like someone living near a bell tower who eventually stops hearing the bells. Images are perceived without our being conscious of it (cf. studies on subliminal images from the 1970s).<br><br>Stiegler noted that 'every experience that human beings have is in some way mediated by technical and technological instruments.' Today, <b>Epist\u00e9me</b> (knowledge) and <b>T\u00e9chne</b> (technique) are more implicated than ever. Our knowledge, cognition, and opinion of the world is thoroughly mediated by images.<br><br>The philosopher Jean-Luc Nancy similarly signals the transformation of the world from a system of production of things into a <b>system of production of images</b>."},
  {id:11, thinker:"L\u00e1szl\u00f3 Moholy-Nagy", years:"1895\u20131946", concept:"New Vision (Nuova visione)", category:"Visual Culture",
   teaser:"Photography reveals what the human eye cannot see \u2014 the camera as an extension of perception.",
   full:"L\u00e1szl\u00f3 Moholy-Nagy, a Hungarian painter, photographer, and Bauhaus teacher, coined the expression <b>'Nuova visione' (New Vision)</b> in his essay <b>'Malerei Fotografie Film'</b> (Painting Photography Film, 1925).<br><br>The New Vision refers to what the photographic machine can offer and reveal <b>that is not accessible to the human eye</b>. Photography extends human perception into realms previously invisible.<br><br>As Walter Benjamin quoted Moholy-Nagy in his 'Short History of Photography': 'Not the person who ignores the alphabet, but the one who ignores photography, will be the illiterate of the future.'<br><br>This idea was foundational for the development of <b>visual culture studies</b> \u2014 a varied system of knowledge that developed within this theoretical horizon. The New Vision emphasized photography's unique capacities: extreme close-ups, unusual angles, photograms, photomontage, and other techniques that reveal aspects of reality imperceptible to the naked eye."},
  {id:12, thinker:"Nicholas Mirzoeff", years:"", concept:"Visual Turn & Visuality", category:"Visual Culture",
   teaser:"The modern tendency to visualize existence \u2014 depicting what is not necessarily visual.",
   full:"Nicholas Mirzoeff, an important author in visual culture studies, speaks of the <b>visual turn</b> as the 'modern tendency to depict or visualize existence [...] [visualizing] things that are not necessarily visual.'<br><br>The power of the image is culturally conditioned. Mirzoeff emphasizes that <b>visuality</b> is not just about seeing but about the social and political structures that determine what can be seen, by whom, and how.<br><br>The concept connects to the broader historical shifts:<br>\u2022 <b>Linguistic Turn</b> (Rorty, 1967): Philosophy focused on language as the primary medium of meaning.<br>\u2022 <b>Iconic Turn</b> (Boehm, 2009): Recognition that images have become the dominant carriers of information and meaning, surpassing language.<br>\u2022 <b>Visual Turn</b> (Mirzoeff): Focus on visuality as a cultural practice with political implications.<br><br>Mirzoeff describes the selfie as the first 'visual signature of our era,' connecting it to the history of self-portraiture from mirror reflections to photography to cinema. The selfie functions as a mirror: 'while I take, I watch myself.'"},
  {id:13, thinker:"Cl\u00e9ment Ch\u00e9roux", years:"", concept:"Visual Persistence & Diplopia", category:"Visual Culture",
   teaser:"After 9/11, media imposed a single visual matrix \u2014 we see only what we already know.",
   full:"Cl\u00e9ment Ch\u00e9roux analyzed the images of <b>September 11, 2001</b> \u2014 the first event to be photographed en masse from the position of the eyewitness \u2014 and spoke of <b>visual persistence (persistenza visiva)</b> and <b>diplopia</b>.<br><br><b>Diplopia</b> (seeing double) refers to the action of our cerebellum, which takes two images from our eyes and combines them into a single three-dimensional image. In doing so, it corrects various aberrations \u2014 chromatic, structural... but above all <b>cultural</b>. We <b>see only what we know</b>.<br><br>Despite 9/11 being the first massively photographed event, the available image types were surprisingly few. Official media imposed a single visual matrix: not the panic in the streets, the bodies, the cadavers, the desperation, but <b>the top floors of the towers in flames</b>.<br><br>Ch\u00e9roux identified how the media drew on <b>collective memory</b>, specifically the attack on <b>Pearl Harbor</b> (December 7, 1941) \u2014 the 'Day of Infamy.' Black-and-white photos of the era showed ships in flames, an icon recently reactivated by Michael Bay's Hollywood film. Thus the image of the burning Twin Towers was introduced as something that needed to be deciphered: it didn't show something new but rather <b>traced back to something already known</b>, inducing a sentiment of 'just war.'<br><br>This is the <b>iconography of national eroticism</b> \u2014 the effort to create symbols from second-degree representations. The towers in smoke became <b>indirect icons</b>, leaning on pre-existing symbols."},
  {id:14, thinker:"Marie-Jos\u00e9 Mondzain", years:"1942\u2013", concept:"Image and the Human Gaze", category:"Visual Culture",
   teaser:"The first humans invented the image to be spectators of their own hands' work.",
   full:"The French philosopher Marie-Jos\u00e9 Mondzain writes: 'The first humans invented the image \u2014 the image of a human who was a spectator of the work of their own hands, the spectacle of human hands that lead to the <b>birth of the human gaze</b>.'<br><br>This connects to the earliest cave paintings (cf. the <b>Chauvet cave in France</b>) \u2014 the first rock images that allowed humans to know themselves and constitute themselves as subjects who could both know themselves and know the world. This marks the <b>birth of the gaze</b>.<br><br>The labor done with the hands to create the image determines the passage from <b>seeing (physiological)</b> to <b>the gaze (cultural)</b>. Image-making is thus fundamentally a humanizing instrument \u2014 the handprint of primitive humans in caves was an essential humanizing activity.<br><br>Mondzain's work connects to the production of images and human responsibility: who creates them and under what conditions they are produced matters (e.g., placing a surveillance camera). A notable exception to human production of images are <b>acheiropoieta</b> \u2014 images 'not made by human hands' (e.g., the Veronica, the Mandylion of Edessa), made by divine will. But these exceptions confirm the rule: if not humans, only God can create images."},
  {id:15, thinker:"W.J.T. Mitchell", years:"1942\u2013", concept:"Picture vs. Image (Materiality)", category:"Materiality",
   teaser:"The material support of an image \u2014 its body \u2014 shapes how we experience it.",
   full:"Mitchell's distinction between <b>picture</b> and <b>image</b> is fundamental to understanding the materiality of visual artifacts:<br><br>\u2022 <b>Image</b>: The immaterial content \u2014 what appears in the picture, which can survive as memory, reproduction, or narrative, independent of any particular material support.<br>\u2022 <b>Picture</b>: The material, tangible image \u2014 the painting, the statue, the photograph considered as medium/material support. Mitchell compares the picture to the <b>house/body</b> in which the image takes up residence.<br><br>Digitalization is producing a progressive dissolution of the materiality of images. Yet the more our daily experience becomes disembodied, the more important it becomes to analyze the role and value of <b>materiality</b> in constructing the relationship between visual representations and observers.<br><br><b>Materiality</b> includes not only the matter itself but all factors that make the image function: <b>visuality and apticity</b> (the haptic, touchable quality). Cultural studies have examined the intercorporeal relationship between images and observers \u2014 images are made to be used, manipulated, touched.<br><br>Examples of materiality's importance: Tibetan monks hiding photos of the Dalai Lama in the folds of their robes during the Chinese Cultural Revolution; Quentin Tarantino choosing to shoot exclusively on film in 'Grindhouse' (2007), intentionally producing scratches and imperfections on the celluloid to emphasize its material nature."},
  {id:16, thinker:"Acheiropoieta", years:"", concept:"Images Not Made by Human Hands", category:"Iconology",
   teaser:"Miraculous images created by divine will \u2014 exceptions that prove humans are the makers of images.",
   full:"<b>Acheiropoieta</b> (from Greek: 'not made by hands') are images believed to be created not by human agency but by divine will. Key examples include:<br><br>\u2022 <b>The Veronica</b>: The cloth said to bear the imprint of Christ's face.<br>\u2022 <b>The Mandylion of Edessa</b>: Another miraculous image of Christ.<br><br>These autogenous objects remove from the image the <b>quality of artifice</b>, positioning themselves without ambiguity as non-problematic representations in religious and devotional contexts \u2014 direct channels of communication with the divine.<br><br>However, apart from these exceptions, iconic representations are <b>an essentially human affair</b>. The exception confirms the rule: if not humans, only God can create images. Image-making is fundamentally a <b>humanizing activity</b>, as Marie-Jos\u00e9 Mondzain argues \u2014 from the handprints in prehistoric caves to contemporary digital art.<br><br>Acheiropoieta are relevant because they demonstrate how human cultures have always grappled with the <b>power of images</b> and the question of their origin and authority."},
  {id:17, thinker:"Aniconism & Iconoclasm", years:"", concept:"Boundaries of the Visible", category:"Visual Culture",
   teaser:"The prohibition or destruction of images reveals the profound power societies attribute to them.",
   full:"<b>Aniconism</b> is not simply the opposite of iconism. It emerges as a condition in the social management of the visible and the articulation of the image's conditions of existence and possibility.<br><br>The term arose in the mid-19th century to account for the <b>absence of figurative representations</b> in the art of early civilizations \u2014 due to impossibility rather than prohibition of representing the divine in human form. Over time, this neutral quality transformed into a dogmatic position.<br><br>Aniconism rests on two aspects:<br>\u2022 A desire to maintain portions of existence and thought in <b>indivisibility and immateriality</b>.<br>\u2022 A <b>distrust</b> of figurative representation based on the principle of resemblance.<br><br><b>Iconoclasm</b> is the active destruction of images. After 9/11, the removal of the Twin Towers from many films and media was an example of the <b>representation of violence</b> \u2014 a temporary prohibition on fabricating certain types of images.<br><br>A specific social system not only determines what images are and what can be done in reaction to them, but also defines implicit or explicit <b>boundaries of visibility</b> \u2014 the very possibility that the visible becomes image, materially inscribed on some type of support.<br><br>Both aniconism and iconoclasm demonstrate a <b>concern about the power of images</b> \u2014 using the strategy of prohibition and subtraction."},
  {id:18, thinker:"Enactivism of Images", years:"", concept:"Enactive Potential", category:"Agency",
   teaser:"Images have an enactive potential \u2014 their structure already anticipates the emotional reactions they will trigger.",
   full:"Some scholars (especially D'Aloia and Eugeni, cinema studies researchers) speak of the <b>enactivism of images</b>: images have an enactive potential because their structure already takes into account the emotional reactions they will trigger in subjects.<br><br>For example, a suspense scene is designed with consideration for the viewer's reaction times. The image's efficacy derives from a <b>surplus</b> (as Boehm described) that depends on the image's linguistic nature but transcends the matter in which it is inscribed.<br><br>This concept bridges Gell's agency theory, Bredekamp's latent efficacy, and Boehm's iconic surplus. The common thread: images are not passive objects waiting to be interpreted, but <b>active agents</b> that influence perception, cognition, and behavior.<br><br>The passage from <b>effect to affect</b> is crucial: the effect is immediate, but it works in memory, influences culture. Images condition our behavior, direct our actions, and have an emotional potential (agency). This influence on behavior expresses a <b>power</b> of images."},
  {id:19, thinker:"Andr\u00e9 Bazin", years:"1918\u20131958", concept:"Ontology of the Photographic Image", category:"Photography Theory",
   teaser:"Photography as embalming \u2014 not imitation but a prolongation of the real.",
   full:"Andr\u00e9 Bazin, in his 'Ontology of the Photographic Image' from the work <b>'Cos'\u00e8 il cinema?'</b> (What is Cinema?), connected photography and cinema to the ancient human desire to preserve life.<br><br>Cinema, as the last of the plastic arts, definitively resolves the <b>mummy complex (complesso della mummia)</b> \u2014 humanity's ancient urge to embalm, to preserve the body against time. Photography benefits from a 'transfer' of reality: it is <b>not imitation but prolongation of the real</b>.<br><br>For Bazin, close to William Henry Fox Talbot's vision, photography is a means through which nature can show itself \u2014 without being either a taking or an addition to reality. The photograph does not reproduce the real but <b>incarnates it</b>.<br><br>This connects to the <b>incarnationist model</b>: like the Shroud of Turin, which does not reproduce but incarnates the properties of the divine, the photograph incarnates reality. The sacred icon represents a prolongation of the primary incarnation (God in Christ).<br><br>Among post-war visual phenomena are the <b>natural photographs (fotografie naturali)</b> produced by the atomic explosions at Hiroshima and Nagasaki (1945) \u2014 human bodies impressed on pavement at over 2000\u00b0C. These are not depictions of bodies but their <b>transformation into images</b> \u2014 indexical signs of past existences."},
  {id:20, thinker:"Post-photography", years:"", concept:"The Post-photographic Turn", category:"Photography Theory",
   teaser:"Digital photography breaks the mystical bond between image and reality.",
   full:"<b>Post-photography</b> is a term used by art historian Geoffrey Batchen to define the new condition of the image. The proliferation of the photographic in contemporary art is not an affirmation of ready-made aesthetics but a <b>loss of photography's specificity</b> as it infiltrates painting, sculpture, and performance.<br><br>The post-photographic turn raises three precise questions:<br>\u2022 The relationship between <b>image and reality</b><br>\u2022 The relationship between <b>human eye and machine eye</b><br>\u2022 The relationship between <b>memory and network culture</b><br><br><b>Key shift</b>: If indexicality is the essence of the photographic, the operation performed by digital cameras risks <b>no longer being photography</b>. In analog photography, light physically touched the film (creating a 'cast' of the body). In digital photography, light is collected by a sensor and translated into an electronic flow \u2014 the action of light acquires a <b>more elusive materiality</b>.<br><br>However, for Mitchell, digitalization is no more artificial than the natural development in the camera obscura. For Claudio Marra, digitalization intervenes only in the phase following image creation. The electronic memorization does not invalidate the indexical substrate \u2014 the index is preserved in the <b>impression phase</b>, not in the visualization phase.<br><br>The contemporary <b>fauxtographie</b> considers the photograph as a draft to be modified and transformed (even generating fakes), no longer a trace of the real.<br><br><b>Thomas Ruff</b>'s work with his 'jpegs' series (2004-2009) exemplifies this: searching internet archives for iconic journalistic photos and hypercompressing/decompressing them, making the <b>pixel</b> visible as the minimal unit of digital visual language."},
  {id:21, thinker:"Forensic Architecture", years:"est. 2010", concept:"The Trace in the Digital Era", category:"Visual Culture",
   teaser:"Using degraded digital images as evidence \u2014 forensic oceanography, 3D modeling, and counter-investigation.",
   full:"<b>Forensic Architecture</b> is an interdisciplinary field of study and practice created in 2010 by Eyal Weizman. It uses modern techniques such as <b>3D modeling</b>, data analysis, study of photographs, primarily collected in the field but also searched online, to integrate information from satellite images and official documentation.<br><br>Many of its investigations concern the Middle East, where the sheer volume of daily war coverage is massive enough to permit reconstruction of any military action.<br><br>A key area is <b>forensic oceanography</b> \u2014 investigating the militarized border imposed by European states on maritime frontiers in response to illegal migrant flows. The agency has helped prove European state responsibility in specific incidents of failed rescue at sea.<br><br>Forensic Architecture's work updates the question of the <b>trace</b> in the digital era. It uses <b>degraded materials</b> \u2014 low resolution, low definition, barely iconic \u2014 and instead valorizes the <b>indexical function</b> through new technologies (computer graphics, pattern recognition, 3D modeling).<br><br>Photography software analyzes images in 2D, calculates distances through triangulation and metadata, creates new pixels by matching multiple 2D images in 3D space. The virtual reconstruction is then confronted with the real world through <b>ground truthing</b>."},
  {id:22, thinker:"Susan Sontag", years:"1933\u20132004", concept:"On Photography", category:"Photography Theory",
   teaser:"Photography as predatory violence \u2014 transforming people into symbolically possessed objects.",
   full:"The American philosopher and writer Susan Sontag published <b>'Sulla fotografia: realt\u00e0 e immagine nella nostra societ\u00e0'</b> (On Photography, 1977). She saw photography as a form of <b>'predatory violence'</b>.<br><br>The photographer imposes a gaze, invading the other person's sphere of safety. Sontag wrote: 'To photograph is equivalent to <b>transforming people into objects that can be symbolically possessed</b>.'<br><br>Today we are forced to give ourselves iconically, to become image. In roughly 40-50 years, the individual has come to define themselves increasingly through the quality of their relationship with media. This has coincided with the passage from analog mass media to digital and individual media. In new mass media, users are simultaneously <b>producers and consumers (prosumers)</b>.<br><br>Barthes was deeply influenced by Sontag's work when writing Camera Lucida. Sontag's analysis laid the groundwork for understanding photography not merely as documentation but as an <b>act of power</b> embedded in social, colonial, and institutional relationships."},
  {id:23, thinker:"Visual / Linguistic / Iconic Turn", years:"", concept:"Key Turns in Cultural Theory", category:"Visual Culture",
   teaser:"Three paradigm shifts: from language to images to the recognition that images think differently than words.",
   full:"Three major 'turns' in cultural theory mark the shifting understanding of how humans create meaning:<br><br><b>1. Linguistic Turn</b> (Richard Rorty, 1967): Philosophy and the humanities focused on <b>language</b> as the primary medium through which meaning is constructed. Influenced by structuralism and post-structuralism.<br><br><b>2. Iconic Turn / Pictorial Turn</b> (Gottfried Boehm, 2009 / W.J.T. Mitchell, 1994): Recognition that <b>images</b> have become the dominant carriers of information and meaning in contemporary culture. This is not just about images being more common, but about the realization that images operate with their own logic \u2014 <b>there is no hierarchy, no pre-established syntax</b> in the image. The eye moves freely. Visual language is comprehensible, but we have no fixed code for it.<br><br><b>3. Visual Turn</b> (Nicholas Mirzoeff): The modern tendency to <b>visualize</b> existence, depicting things that are not necessarily visual. Focus on visuality as a <b>cultural and political practice</b> with implications for power and surveillance.<br><br>Key distinction: The linguistic turn argued that reality is constructed through language. The iconic/pictorial turn argues that images are not merely illustrations of linguistic meaning but have their own irreducible way of creating understanding. As Federico Ferrari writes: 'Seeing is not reading' \u2014 the image has no hierarchy, and meaning shifts from the domain of logos to the image itself, in its essence."},
];

// Get unique lectures
const lectures = [...new Set(works.map(w => w.lez))].sort((a,b) => a-b);

// Build filter buttons
const filtersEl = document.getElementById('filters');
let filterHTML = '<button class="filter-btn active" onclick="setFilter(\'all\')">All</button>';
lectures.forEach(l => {
    filterHTML += `<button class="filter-btn" onclick="setFilter(${l})">Lez. ${l}</button>`;
});
filtersEl.innerHTML = filterHTML;

// Populate flashcard lecture select
const fcLecSelect = document.getElementById('fc-lecture');
lectures.forEach(l => {
    fcLecSelect.innerHTML += `<option value="${l}">Lesson ${l}</option>`;
});

// Theory categories
const theoryCategories = [...new Set(concepts.map(c => c.category))].sort();
const tfcCatSelect = document.getElementById('tfc-category');
theoryCategories.forEach(cat => {
    tfcCatSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
});

let currentFilter = 'all';
let currentView = 'gallery';
let currentModalIndex = -1;
let filteredWorks = [...works];
let currentTheoryFilter = 'all';
let theorySubView = 'concepts';

function switchView(view) {
    currentView = view;
    document.getElementById('gallery').style.display = view === 'gallery' ? 'grid' : 'none';
    document.getElementById('flashcard-view').style.display = view === 'flashcard' ? 'block' : 'none';
    document.getElementById('checklist-view').style.display = view === 'checklist' ? 'block' : 'none';
    document.getElementById('theory-view').style.display = view === 'theory' ? 'block' : 'none';
    document.getElementById('filters').style.display = view === 'gallery' ? 'flex' : 'none';
    document.getElementById('shortcut-hint').style.display = (view === 'flashcard' || (view === 'theory' && theorySubView === 'theory-fc')) ? 'block' : 'none';

    document.querySelectorAll('.nav-tabs button').forEach((btn, i) => {
        const views = ['gallery','flashcard','checklist','theory'];
        btn.classList.toggle('active', views[i] === view);
        btn.classList.toggle('theory-tab-active', views[i] === view && view === 'theory');
    });

    if (view === 'checklist') renderChecklist();
    if (view === 'theory') {
        renderTheoryFilters();
        renderConceptGrid();
    }
}

function setFilter(lez) {
    currentFilter = lez;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === (lez === 'all' ? 'All' : `Lez. ${lez}`));
    });
    filterGallery();
}

function filterGallery() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    filteredWorks = works.filter(w => {
        const matchFilter = currentFilter === 'all' || w.lez === currentFilter;
        const matchSearch = !q ||
            w.author.toLowerCase().includes(q) ||
            w.title.toLowerCase().includes(q) ||
            w.date.toLowerCase().includes(q) ||
            w.technique.toLowerCase().includes(q) ||
            w.museum.toLowerCase().includes(q) ||
            w.notes.toLowerCase().includes(q);
        return matchFilter && matchSearch;
    });
    renderGallery();
}

function renderGallery() {
    const el = document.getElementById('gallery');
    el.innerHTML = filteredWorks.map((w, i) => `
        <div class="card" onclick="openModal(${works.indexOf(w)})">
            ${w.img ? `<img class="card-img" src="${w.img}" alt="${w.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>${w.title}</div>'">` : `<div class="card-img-placeholder">${w.title}</div>`}
            <div class="card-body">
                <div class="card-num">#${w.n}</div>
                <div class="card-title">${w.title}</div>
                <div class="card-author">${w.author} ${w.life ? `(${w.life})` : ''}</div>
                <div class="card-meta">${w.date} &bull; ${w.technique.substring(0, 60)}${w.technique.length > 60 ? '...' : ''}</div>
                <span class="card-lecture">Lez. ${w.lez}</span>
            </div>
        </div>
    `).join('');
}

// Modal
let modalType = 'work'; // 'work' or 'concept'
function openModal(idx) {
    modalType = 'work';
    currentModalIndex = idx;
    const w = works[idx];
    document.getElementById('modal-content').innerHTML = `
        ${w.img ? `<img class="modal-img" src="${w.img}" alt="${w.title}" onerror="this.outerHTML='<div class=\\'modal-img-placeholder\\'>${w.title}</div>'">` : `<div class="modal-img-placeholder">${w.title}</div>`}
        <div class="modal-body">
            <div class="card-num">#${w.n} &bull; Lesson ${w.lez}</div>
            <h2>${w.title}</h2>
            <div class="author">${w.author} ${w.life ? `(${w.life})` : ''}</div>
            <div class="modal-detail"><strong>Date:</strong> ${w.date}</div>
            <div class="modal-detail"><strong>Technique:</strong> ${w.technique}</div>
            ${w.dimensions ? `<div class="modal-detail"><strong>Dimensions:</strong> ${w.dimensions}</div>` : ''}
            ${w.location || w.museum ? `<div class="modal-detail"><strong>Location:</strong> ${[w.location, w.museum].filter(Boolean).join(', ')}</div>` : ''}
            ${w.inv ? `<div class="modal-detail"><strong>Inventory:</strong> ${w.inv}</div>` : ''}
            <div class="modal-detail"><strong>Notes:</strong> ${w.notes}</div>
        </div>
    `;
    document.getElementById('modal-nav').style.display = 'flex';
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function openConceptModal(id) {
    modalType = 'concept';
    const c = concepts.find(cc => cc.id === id);
    if (!c) return;
    document.getElementById('modal-content').innerHTML = `
        <div class="modal-body theory-modal-body" style="padding-top:32px">
            <span class="category-tag" style="margin-bottom:12px">${c.category}</span>
            <h2>${c.concept}</h2>
            <div class="author">${c.thinker} ${c.years ? `(${c.years})` : ''}</div>
            <div class="modal-detail" style="margin-top:16px;line-height:1.8">${c.full}</div>
        </div>
    `;
    document.getElementById('modal-nav').style.display = 'none';
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
}

function navigateModal(dir) {
    if (modalType !== 'work') return;
    let newIdx = currentModalIndex + dir;
    if (newIdx < 0) newIdx = works.length - 1;
    if (newIdx >= works.length) newIdx = 0;
    openModal(newIdx);
}

// Flashcards
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;
let fcScore = { knew: 0, didnt: 0 };

function startFlashcards() {
    const lez = document.getElementById('fc-lecture').value;
    const type = document.getElementById('fc-type').value;
    const count = parseInt(document.getElementById('fc-count').value);
    const shuffle = document.getElementById('fc-shuffle').checked;

    let pool = lez === 'all' ? [...works] : works.filter(w => w.lez === parseInt(lez));
    if (shuffle) pool.sort(() => Math.random() - 0.5);
    fcDeck = pool.slice(0, Math.min(count, pool.length));
    fcIndex = 0;
    fcFlipped = false;
    fcScore = { knew: 0, didnt: 0 };

    fcDeck.quizType = type;

    document.getElementById('fc-settings').style.display = 'none';
    document.getElementById('fc-session').style.display = 'block';
    document.getElementById('fc-score').style.display = 'none';

    renderFlashcard();
}

function renderFlashcard() {
    if (fcIndex >= fcDeck.length) {
        showScore();
        return;
    }

    const w = fcDeck[fcIndex];
    const type = fcDeck.quizType === 'random' ?
        ['image-to-info','title-to-author','author-to-works'][Math.floor(Math.random()*3)] : fcDeck.quizType;

    fcFlipped = false;
    const card = document.getElementById('flashcard');

    document.getElementById('fc-progress-text').textContent = `${fcIndex + 1} / ${fcDeck.length}`;
    document.getElementById('fc-progress-fill').style.width = `${((fcIndex) / fcDeck.length) * 100}%`;

    let frontHTML = '';
    let backHTML = '';

    if (type === 'image-to-info') {
        frontHTML = `
            ${w.img ? `<img class="fc-img" src="${w.img}" alt="?" onerror="this.outerHTML='<div class=\\'fc-img-placeholder\\'>Image not available</div>'">` : `<div class="fc-img-placeholder">${w.title}</div>`}
            <div class="fc-question">Who made this? When? What technique?</div>
            <div class="fc-hint">Lesson ${w.lez} &bull; #${w.n}</div>
        `;
        backHTML = `
            <div class="fc-answer">
                <h3>${w.title}</h3>
                <p><span class="label">Author:</span> ${w.author} ${w.life ? `(${w.life})` : ''}</p>
                <p><span class="label">Date:</span> ${w.date}</p>
                <p><span class="label">Technique:</span> ${w.technique}</p>
                ${w.dimensions ? `<p><span class="label">Dimensions:</span> ${w.dimensions}</p>` : ''}
                ${w.museum ? `<p><span class="label">Museum:</span> ${w.museum}${w.location ? ', ' + w.location : ''}</p>` : ''}
                <p><span class="label">Notes:</span> ${w.notes}</p>
            </div>
        `;
    } else if (type === 'title-to-author') {
        frontHTML = `
            <div class="fc-question" style="font-size:1.4rem;margin-bottom:16px">"${w.title}"</div>
            <div class="fc-hint">Who is the author? When was it made?<br>Lesson ${w.lez} &bull; #${w.n}</div>
        `;
        backHTML = `
            <div class="fc-answer">
                ${w.img ? `<img class="fc-img" src="${w.img}" alt="${w.title}" onerror="this.style.display='none'" style="margin:0 auto 16px;display:block">` : ''}
                <h3>${w.author} ${w.life ? `(${w.life})` : ''}</h3>
                <p><span class="label">Date:</span> ${w.date}</p>
                <p><span class="label">Technique:</span> ${w.technique}</p>
                <p><span class="label">Notes:</span> ${w.notes}</p>
            </div>
        `;
    } else {
        const authorWorks = works.filter(ww => ww.author === w.author);
        frontHTML = `
            <div class="fc-question" style="font-size:1.4rem;margin-bottom:16px">${w.author}</div>
            <div class="fc-hint">Name the works by this author in the course<br>${w.life ? `(${w.life})` : ''}</div>
        `;
        backHTML = `
            <div class="fc-answer">
                <h3>${w.author}</h3>
                ${authorWorks.map(aw => `<p>#${aw.n} <strong>${aw.title}</strong>, ${aw.date} - ${aw.technique.substring(0,50)}...</p>`).join('')}
            </div>
        `;
    }

    card.innerHTML = `
        <div class="fc-front">${frontHTML}<div class="fc-tap">Click or press Space to reveal answer</div></div>
        <div class="fc-answer-wrap" style="display:none">${backHTML}</div>
    `;
}

function flipCard() {
    if (fcIndex >= fcDeck.length) return;
    fcFlipped = !fcFlipped;
    const card = document.getElementById('flashcard');
    const front = card.querySelector('.fc-front');
    const back = card.querySelector('.fc-answer-wrap');

    if (fcFlipped) {
        front.style.display = 'none';
        back.style.display = 'block';
        back.querySelector('.fc-answer').style.display = 'block';
    } else {
        front.style.display = 'block';
        back.style.display = 'none';
    }
}

function markCard(knew) {
    if (!fcFlipped) flipCard();
    setTimeout(() => {
        if (knew) fcScore.knew++; else fcScore.didnt++;
        fcIndex++;
        renderFlashcard();
    }, 200);
}

function showScore() {
    const total = fcScore.knew + fcScore.didnt;
    const pct = total > 0 ? Math.round((fcScore.knew / total) * 100) : 0;

    document.getElementById('fc-session').style.display = 'none';
    const scoreEl = document.getElementById('fc-score');
    scoreEl.style.display = 'block';
    scoreEl.innerHTML = `
        <h2>Session Complete!</h2>
        <div class="big-num">${pct}%</div>
        <p>${fcScore.knew} correct out of ${total}</p>
        <p style="margin-top:16px; color: var(--success)">\u2713 Knew: ${fcScore.knew}</p>
        <p style="color: var(--danger)">\u2717 Didn't know: ${fcScore.didnt}</p>
        <div style="margin-top:24px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
            <button class="fc-btn" onclick="startFlashcards()">Retry Same Set</button>
            <button class="fc-btn" onclick="resetFlashcards()">New Session</button>
            ${fcScore.didnt > 0 ? `<button class="fc-btn didnt" onclick="retryMissed()">Retry Missed (${fcScore.didnt})</button>` : ''}
        </div>
    `;
}

function resetFlashcards() {
    document.getElementById('fc-settings').style.display = 'block';
    document.getElementById('fc-session').style.display = 'none';
    document.getElementById('fc-score').style.display = 'none';
}

function retryMissed() {
    startFlashcards();
}

// Checklist
function renderChecklist() {
    const saved = JSON.parse(localStorage.getItem('foto-checklist') || '{}');
    const el = document.getElementById('checklist-view');

    const checked = Object.values(saved).filter(Boolean).length;

    let html = `
        <div class="checklist-stats">
            <span>Progress: <strong>${checked}</strong> / ${works.length} studied</span>
            <span>(<strong>${Math.round((checked/works.length)*100)}%</strong>)</span>
            <button class="fc-btn" onclick="clearChecklist()" style="margin-left:auto;padding:5px 12px;font-size:0.8rem">Reset All</button>
        </div>
    `;

    lectures.forEach(lez => {
        const lezWorks = works.filter(w => w.lez === lez);
        html += `<div class="checklist-lecture"><h3>Lesson ${lez}</h3>`;
        lezWorks.forEach(w => {
            const isChecked = saved[w.n] || false;
            html += `
                <div class="checklist-item ${isChecked ? 'checked' : ''}">
                    <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck(${w.n}, this)">
                    <div class="cl-text"><strong>#${w.n} ${w.author}</strong> - ${w.title}, ${w.date}</div>
                </div>
            `;
        });
        html += '</div>';
    });

    el.innerHTML = html;
}

function toggleCheck(n, el) {
    const saved = JSON.parse(localStorage.getItem('foto-checklist') || '{}');
    saved[n] = el.checked;
    localStorage.setItem('foto-checklist', JSON.stringify(saved));
    el.closest('.checklist-item').classList.toggle('checked', el.checked);
    const checked = Object.values(saved).filter(Boolean).length;
    document.querySelector('.checklist-stats span:first-child strong').textContent = checked;
    document.querySelector('.checklist-stats span:nth-child(2) strong').textContent = Math.round((checked/works.length)*100) + '%';
}

function clearChecklist() {
    localStorage.removeItem('foto-checklist');
    renderChecklist();
}

// ===== THEORY SECTION =====

function switchTheoryTab(tab) {
    theorySubView = tab;
    document.getElementById('theory-concepts-panel').style.display = tab === 'concepts' ? 'block' : 'none';
    document.getElementById('theory-fc-panel').style.display = tab === 'theory-fc' ? 'block' : 'none';
    document.querySelectorAll('.theory-sub-tabs button').forEach((btn, i) => {
        btn.classList.toggle('active', ['concepts','theory-fc'][i] === tab);
    });
    document.getElementById('shortcut-hint').style.display = tab === 'theory-fc' ? 'block' : 'none';
}

function renderTheoryFilters() {
    const el = document.getElementById('theory-filters');
    let html = '<button class="filter-btn theory-filter active" onclick="setTheoryFilter(\'all\')">All</button>';
    theoryCategories.forEach(cat => {
        html += `<button class="filter-btn theory-filter" onclick="setTheoryFilter('${cat}')">${cat}</button>`;
    });
    el.innerHTML = html;
}

function setTheoryFilter(cat) {
    currentTheoryFilter = cat;
    document.querySelectorAll('#theory-filters .filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === (cat === 'all' ? 'All' : cat));
    });
    renderConceptGrid();
}

function filterConcepts() {
    renderConceptGrid();
}

function renderConceptGrid() {
    const q = (document.getElementById('theorySearchInput')?.value || '').toLowerCase();
    const filtered = concepts.filter(c => {
        const matchCat = currentTheoryFilter === 'all' || c.category === currentTheoryFilter;
        const matchSearch = !q ||
            c.thinker.toLowerCase().includes(q) ||
            c.concept.toLowerCase().includes(q) ||
            c.category.toLowerCase().includes(q) ||
            c.teaser.toLowerCase().includes(q) ||
            c.full.toLowerCase().includes(q);
        return matchCat && matchSearch;
    });

    const el = document.getElementById('concept-grid');
    el.innerHTML = filtered.map(c => `
        <div class="concept-card" onclick="openConceptModal(${c.id})">
            <div class="thinker">${c.thinker}</div>
            ${c.years ? `<div class="thinker-years">${c.years}</div>` : ''}
            <div class="concept-name">${c.concept}</div>
            <span class="category-tag">${c.category}</span>
            <div class="teaser">${c.teaser}</div>
        </div>
    `).join('');
}

// Theory Flashcards
let tfcDeck = [];
let tfcIndex = 0;
let tfcFlipped = false;
let tfcScore = { knew: 0, didnt: 0 };

function startTheoryFlashcards() {
    const cat = document.getElementById('tfc-category').value;
    const count = parseInt(document.getElementById('tfc-count').value);
    const shuffle = document.getElementById('tfc-shuffle').checked;

    let pool = cat === 'all' ? [...concepts] : concepts.filter(c => c.category === cat);
    if (shuffle) pool.sort(() => Math.random() - 0.5);
    tfcDeck = pool.slice(0, Math.min(count, pool.length));
    tfcIndex = 0;
    tfcFlipped = false;
    tfcScore = { knew: 0, didnt: 0 };

    document.getElementById('tfc-settings').style.display = 'none';
    document.getElementById('tfc-session').style.display = 'block';
    document.getElementById('tfc-score').style.display = 'none';

    renderTheoryFlashcard();
}

function renderTheoryFlashcard() {
    if (tfcIndex >= tfcDeck.length) {
        showTheoryScore();
        return;
    }

    const c = tfcDeck[tfcIndex];
    tfcFlipped = false;
    const card = document.getElementById('theory-flashcard');

    document.getElementById('tfc-progress-text').textContent = `${tfcIndex + 1} / ${tfcDeck.length}`;
    document.getElementById('tfc-progress-fill').style.width = `${((tfcIndex) / tfcDeck.length) * 100}%`;

    card.innerHTML = `
        <div class="fc-front">
            <span class="category-tag" style="margin-bottom:16px">${c.category}</span>
            <div class="fc-question" style="font-size:1.4rem;margin-bottom:12px;color:var(--theory-accent)">${c.thinker}</div>
            <div class="fc-question" style="font-size:1.1rem">${c.concept}</div>
            <div class="fc-tap" style="margin-top:20px">Click or press Space to reveal answer</div>
        </div>
        <div class="fc-answer-wrap" style="display:none">
            <div class="fc-answer" style="text-align:left">
                <h3 style="color:var(--theory-accent)">${c.concept}</h3>
                <p style="color:var(--theory-accent2);margin-bottom:12px">${c.thinker} ${c.years ? `(${c.years})` : ''}</p>
                <div style="line-height:1.8">${c.full}</div>
            </div>
        </div>
    `;
}

function flipTheoryCard() {
    if (tfcIndex >= tfcDeck.length) return;
    tfcFlipped = !tfcFlipped;
    const card = document.getElementById('theory-flashcard');
    const front = card.querySelector('.fc-front');
    const back = card.querySelector('.fc-answer-wrap');

    if (tfcFlipped) {
        front.style.display = 'none';
        back.style.display = 'block';
        back.querySelector('.fc-answer').style.display = 'block';
    } else {
        front.style.display = 'block';
        back.style.display = 'none';
    }
}

function markTheoryCard(knew) {
    if (!tfcFlipped) flipTheoryCard();
    setTimeout(() => {
        if (knew) tfcScore.knew++; else tfcScore.didnt++;
        tfcIndex++;
        renderTheoryFlashcard();
    }, 200);
}

function showTheoryScore() {
    const total = tfcScore.knew + tfcScore.didnt;
    const pct = total > 0 ? Math.round((tfcScore.knew / total) * 100) : 0;

    document.getElementById('tfc-session').style.display = 'none';
    const scoreEl = document.getElementById('tfc-score');
    scoreEl.style.display = 'block';
    scoreEl.innerHTML = `
        <h2 style="color:var(--theory-accent)">Session Complete!</h2>
        <div class="big-num">${pct}%</div>
        <p>${tfcScore.knew} correct out of ${total}</p>
        <p style="margin-top:16px; color: var(--success)">\u2713 Knew: ${tfcScore.knew}</p>
        <p style="color: var(--danger)">\u2717 Didn't know: ${tfcScore.didnt}</p>
        <div style="margin-top:24px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
            <button class="fc-btn" onclick="startTheoryFlashcards()">Retry Same Set</button>
            <button class="fc-btn" onclick="resetTheoryFlashcards()">New Session</button>
        </div>
    `;
}

function resetTheoryFlashcards() {
    document.getElementById('tfc-settings').style.display = 'block';
    document.getElementById('tfc-session').style.display = 'none';
    document.getElementById('tfc-score').style.display = 'none';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (document.getElementById('modal').classList.contains('open')) {
        if (e.key === 'ArrowLeft') navigateModal(-1);
        if (e.key === 'ArrowRight') navigateModal(1);
    }
    if (currentView === 'flashcard' && document.getElementById('fc-session').style.display === 'block') {
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
        if (e.key === 'ArrowLeft') markCard(false);
        if (e.key === 'ArrowRight') markCard(true);
    }
    if (currentView === 'theory' && theorySubView === 'theory-fc' && document.getElementById('tfc-session').style.display === 'block') {
        if (e.key === ' ') { e.preventDefault(); flipTheoryCard(); }
        if (e.key === 'ArrowLeft') markTheoryCard(false);
        if (e.key === 'ArrowRight') markTheoryCard(true);
    }
});

// Initial render
renderGallery();
</script>
</body>
</html>
